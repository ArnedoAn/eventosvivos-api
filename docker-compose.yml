services:
  db:
    image: postgres:17
    container_name: eventosvivos-db
    environment:
      POSTGRES_DB: eventosvivos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - eventosvivos-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventosvivos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: eventosvivos-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Database=eventosvivos;Username=postgres;Password=postgres"
      Jwt__Key: "59MmDJHBkqBum6G0t4F46Hsdm/KjGw+aEQt+tVLQS4344Epq+2/RWDGRQWzk6Iqiln4q1o6+eJ+9Xe2ibf9tWw=="
      Jwt__Issuer: "EventosVivos"
      Jwt__Audience: "EventosVivos"
      Reservation__PendingHoldsInventory: "true"
      Reservation__PendingExpirationMinutes: "0"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /api/events HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

volumes:
  eventosvivos-data:
